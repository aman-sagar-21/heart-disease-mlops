name: Heart Disease MLOps CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Upgrade pip
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      # Step 4: Install project dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # Step 5: Display Python version
      - name: Check Python Version
        run: |
          python --version

      # Step 6: Run unit tests
      - name: Run Unit Tests
        run: |
          pytest -v

      # Step 7: Verify trained model exists
      - name: Check Model File
        run: |
          test -f models/heart_disease_rf_pipeline_v1.pkl

      # Step 8: Verify model can be loaded
      - name: Load Trained Model
        run: |
          python -c "import joblib; joblib.load('models/heart_disease_rf_pipeline_v1.pkl'); print('Model loaded successfully!')"

      # Step 9: Success message
      - name: CI Completed
        run: |
          echo "All tests passed successfully!"