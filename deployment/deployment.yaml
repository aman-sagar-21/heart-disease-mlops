apiVersion: apps/v1
kind: Deployment

metadata:
  name: heart-disease-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: heart-disease-api

  template:
    metadata:
      labels:
        app: heart-disease-api

    spec:
      containers:
      - name: heart-disease-api
        image: amansagar2001/heart-disease-api:v2
        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"